<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", sans-serif;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --border: #dbe4f0;
        --text: #111827;
        --muted: #64748b;
        --accent: #4f46e5;
        --accent-light: #eef2ff;
        --success: #10b981;
        --success-light: #dcfce7;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --danger: #ef4444;
        --danger-light: #fee2e2;
        --shadow-sm: 0 8px 24px rgba(15, 23, 42, 0.04);
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          radial-gradient(
            circle at top left,
            rgba(79, 70, 229, 0.08),
            transparent 30%
          ),
          var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      .app-header {
        padding: 28px 40px 24px;
        border-bottom: 1px solid rgba(219, 228, 240, 0.8);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow-sm);
      }

      .app-header h1 {
        margin: 0 0 4px;
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .app-header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      main {
        padding: 32px 40px 48px;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, minmax(280px, 1fr));
        gap: 24px;
        align-items: start;
      }

      .column {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
      }

      .column:hover {
        box-shadow: var(--shadow);
      }

      .column h2 {
        margin: 0 0 16px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .column h2::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      .column[data-status="ToDo"] h2::before {
        background: #3b82f6;
      }

      .column[data-status="InProgress"] h2::before {
        background: #f59e0b;
      }

      .column[data-status="Done"] h2::before {
        background: #10b981;
      }

      .task-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        border: 1px solid rgba(219, 228, 240, 0.9);
        border-radius: 16px;
        padding: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        cursor: grab;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), #8b5cf6);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .card:hover {
        box-shadow: var(--shadow);
        border-color: var(--accent);
        transform: translateY(-3px);
      }

      .card:hover::before {
        opacity: 1;
      }

      .card-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .card-main {
        flex: 1;
        min-width: 0;
      }

      .card-title {
        margin: 0 0 8px;
        font-size: 1.04rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.35;
      }

      .card-description {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        font-size: 0.95rem;
      }

      .card-side {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        min-width: 170px;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .card-assignee {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 500;
        text-align: right;
      }

      .card-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 2px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .badge.priority-high {
        background: var(--danger-light);
        color: #991b1b;
      }

      .badge.priority-medium {
        background: var(--warning-light);
        color: #92400e;
      }

      .badge.priority-low {
        background: var(--success-light);
        color: #065f46;
      }

      .badge.due-date {
        background: var(--accent-light);
        color: var(--accent);
      }

      .badge.overdue {
        background: var(--danger-light);
        color: #991b1b;
      }

      .badge.reminder {
        background: var(--warning-light);
        color: #92400e;
      }

      .edit-btn {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: var(--transition);
      }

      .edit-btn:hover {
        background: var(--accent-light);
        border-color: var(--accent);
        color: var(--accent);
      }

      .card.dragging {
        opacity: 0.5;
        transform: scale(0.95) rotate(-2deg);
        box-shadow: var(--shadow-lg);
      }

      .column.drag-over {
        border-color: var(--accent);
        background: linear-gradient(
          135deg,
          var(--accent-light) 0%,
          transparent 100%
        );
        box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.1);
      }

      .status-error {
        margin-bottom: 12px;
        padding: 12px 14px;
        border: 1px solid var(--danger-light);
        border-radius: 12px;
        background: linear-gradient(135deg, #fef2f2 0%, #fde2e2 100%);
        color: #991b1b;
        font-size: 0.9rem;
        animation: slideDown 0.3s ease-out;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 1000;
        animation: fadeIn 0.2s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        width: min(580px, 100%);
        padding: 12px;
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }

      .modal-header h2 {
        margin: 0;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .modal-close {
        border: none;
        background: transparent;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--muted);
        transition: var(--transition);
        width: 32px;
        height: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }

      .modal-close:hover {
        background: var(--bg);
        color: var(--text);
      }

      .form-grid {
        display: grid;
        gap: 16px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-field label {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
      }

      .form-field input,
      .form-field textarea,
      .form-field select {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 5px 12px;
        font: inherit;
        background: var(--panel);
        color: var(--text);
        transition: var(--transition);
        font-size: 0.95rem;
      }

      .form-field input:focus,
      .form-field textarea:focus,
      .form-field select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .form-field input:hover:not(:focus),
      .form-field textarea:hover:not(:focus),
      .form-field select:hover:not(:focus) {
        border-color: var(--accent);
      }

      .form-field textarea {
        min-height: 100px;
        resize: vertical;
        font-family: inherit;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 5px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .btn {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: var(--transition);
      }

      .btn:hover {
        /* background: var(--bg); */
        border-color: var(--accent);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
        color: white;
        border: none;
        box-shadow: 0 10px 24px rgba(79, 70, 229, 0.25);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .field-error {
        color: #991b1b;
        font-size: 0.85rem;
        font-weight: 500;
      }

      .column[data-status="ToDo"] {
        background: linear-gradient(135deg, #f8fcff 0%, #f0f9ff 100%);
      }

      .column[data-status="InProgress"] {
        background: linear-gradient(135deg, #fffbf0 0%, #fef9f3 100%);
      }

      .column[data-status="Done"] {
        background: linear-gradient(135deg, #f0fdf4 0%, #f7fdf8 100%);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
        margin-bottom: 5px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow-sm);
      }

      .toolbar-label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
      }

      .toolbar input,
      .toolbar select {
        min-width: 140px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        background: var(--panel);
        color: var(--text);
      }

      .toolbar input:focus,
      .toolbar select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .toolbar .search-input {
        min-width: 240px;
      }

      .board-status {
        grid-column: 1 / -1;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f8fafc;
        color: var(--muted);
      }

      @media (max-width: 1200px) {
        .board {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 640px) {
        .board {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .app-header {
          padding: 20px 24px 16px;
        }

        .app-header h1 {
          font-size: 1.8rem;
        }

        main {
          padding: 20px 24px 32px;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
        "
      >
        <div>
          <h1>Task Tracker</h1>
          <p>Keep work moving with a simple Kanban view.</p>
        </div>
        <button id="new-task-btn" class="btn btn-primary" type="button">
          New Task
        </button>
      </div>
    </header>

    <main>
      <div class="toolbar" role="search" aria-label="Task search and filters">
        <label class="toolbar-label">
          <span>Search</span>
          <input
            id="task-search"
            class="search-input"
            type="text"
            placeholder="Title, description, assignee"
          />
        </label>
        <label class="toolbar-label">
          <span>Status</span>
          <select id="status-filter">
            <option value="">All</option>
            <option value="ToDo">To Do</option>
            <option value="InProgress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </label>
        <label class="toolbar-label">
          <span>Priority</span>
          <select id="priority-filter">
            <option value="">All</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </label>
        <label class="toolbar-label">
          <span>Assignee</span>
          <input id="assignee-filter" type="text" placeholder="Assignee" />
        </label>
        <label class="toolbar-label">
          <span>Overdue</span>
          <select id="overdue-filter">
            <option value="">All</option>
            <option value="true">Overdue only</option>
            <option value="false">Not overdue</option>
          </select>
        </label>
        <button id="clear-filters-btn" class="btn" type="button">Clear</button>
      </div>
      <section id="board" class="board" aria-live="polite"></section>
    </main>

    <script>
      const API_URL = "http://localhost:8000";
      const columns = [
        { status: "ToDo", label: "To Do" },
        { status: "InProgress", label: "In Progress" },
        { status: "Done", label: "Done" },
      ];
      const PRIORITY_ORDER = { High: 0, Medium: 1, Low: 2 };
      const ALLOWED_TRANSITIONS = {
        ToDo: ["InProgress"],
        InProgress: ["Done", "ToDo"],
        Done: ["InProgress"],
      };
      const board = document.getElementById("board");
      const newTaskButton = document.getElementById("new-task-btn");
      const searchInput = document.getElementById("task-search");
      const statusFilter = document.getElementById("status-filter");
      const priorityFilter = document.getElementById("priority-filter");
      const assigneeFilter = document.getElementById("assignee-filter");
      const overdueFilter = document.getElementById("overdue-filter");
      const clearFiltersButton = document.getElementById("clear-filters-btn");
      let tasks = [];
      let modalState = null;

      function escapeText(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getDueState(task) {
        if (!task?.due_date) {
          return null;
        }

        const dueDate = new Date(`${task.due_date}T00:00:00`);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));

        if (diffDays < 0) {
          return { kind: "overdue", label: "Overdue" };
        }
        if (diffDays <= 3) {
          return {
            kind: "reminder",
            label: `${diffDays === 0 ? "Due today" : `Due in ${diffDays} day${diffDays === 1 ? "" : "s"}`}`,
          };
        }
        return null;
      }

      function renderBoard(taskList, state = "ready", errorMessage = "") {
        board.innerHTML = "";

        if (state === "loading") {
          const loadingBox = document.createElement("div");
          loadingBox.className = "board-status";
          loadingBox.textContent = "Loading tasks...";
          board.appendChild(loadingBox);
        }

        if (state === "error" || errorMessage) {
          const errorBox = document.createElement("div");
          errorBox.className = "status-error";
          errorBox.textContent = errorMessage || "Unable to load tasks.";
          board.appendChild(errorBox);
        }

        const sortedTasks = [...taskList].sort((a, b) => {
          const priorityDiff =
            PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
          if (priorityDiff !== 0) {
            return priorityDiff;
          }
          return String(a.id).localeCompare(String(b.id));
        });

        columns.forEach((column) => {
          const columnTasks = sortedTasks.filter(
            (task) => task.status === column.status,
          );

          const section = document.createElement("section");
          section.className = "column";
          section.setAttribute("data-status", column.status);
          section.addEventListener("dragover", handleDragOver);
          section.addEventListener("drop", handleDrop);
          section.addEventListener("dragleave", handleDragLeave);

          const heading = document.createElement("h2");
          heading.textContent = `${column.label} (${columnTasks.length})`;
          section.appendChild(heading);

          const taskListElement = document.createElement("div");
          taskListElement.className = "task-list";

          if (columnTasks.length === 0) {
            const placeholder = document.createElement("p");
            placeholder.textContent = "No tasks";
            placeholder.style.margin = "0";
            placeholder.style.color = "#6b7280";
            placeholder.style.fontStyle = "italic";
            taskListElement.appendChild(placeholder);
          } else {
            columnTasks.forEach((task) => {
              const card = document.createElement("article");
              card.className = "card";
              card.draggable = true;
              card.dataset.taskId = task.id;
              card.addEventListener("dragstart", handleDragStart);
              card.addEventListener("dragend", handleDragEnd);

              const content = document.createElement("div");
              content.className = "card-content";

              const main = document.createElement("div");
              main.className = "card-main";

              const title = document.createElement("h3");
              title.className = "card-title";
              title.textContent = task.title;
              main.appendChild(title);

              if (task.description) {
                const description = document.createElement("p");
                description.className = "card-description";
                description.textContent = task.description;
                main.appendChild(description);
              }

              const side = document.createElement("div");
              side.className = "card-side";

              const metaRow = document.createElement("div");
              metaRow.className = "meta-row";

              const priorityBadge = document.createElement("span");
              priorityBadge.className = `badge priority-${String(task.priority).toLowerCase()}`;
              priorityBadge.textContent = task.priority;
              metaRow.appendChild(priorityBadge);

              const dueDateBadge = document.createElement("span");
              dueDateBadge.className = "badge due-date";
              dueDateBadge.textContent = task.due_date
                ? new Date(`${task.due_date}T00:00:00`).toLocaleDateString(
                    undefined,
                    {
                      month: "short",
                      day: "numeric",
                    },
                  )
                : "No due date";
              metaRow.appendChild(dueDateBadge);

              const dueState = getDueState(task);
              if (dueState) {
                const dueStateBadge = document.createElement("span");
                dueStateBadge.className = `badge ${dueState.kind}`;
                dueStateBadge.textContent = dueState.label;
                metaRow.appendChild(dueStateBadge);
              }

              side.appendChild(metaRow);

              const assignee = document.createElement("div");
              assignee.className = "card-assignee";
              assignee.textContent = task.assignee || "Unassigned";
              side.appendChild(assignee);

              const actions = document.createElement("div");
              actions.className = "card-actions";

              const editButton = document.createElement("button");
              editButton.className = "edit-btn";
              editButton.type = "button";
              editButton.textContent = "Edit";
              editButton.addEventListener("click", () => openTaskModal(task));
              actions.appendChild(editButton);
              side.appendChild(actions);

              content.appendChild(main);
              content.appendChild(side);
              card.appendChild(content);

              taskListElement.appendChild(card);
            });
          }

          section.appendChild(taskListElement);
          board.appendChild(section);
        });
      }

      let draggedTaskId = null;
      let draggedFromStatus = null;
      let lastErrorMessage = "";

      function handleDragStart(event) {
        const card = event.currentTarget;
        draggedTaskId = card.dataset.taskId;
        draggedFromStatus = card.closest(".column")?.dataset.status || null;
        card.classList.add("dragging");
        event.dataTransfer?.setData("text/plain", draggedTaskId || "");
      }

      function handleDragEnd(event) {
        event.currentTarget.classList.remove("dragging");
        document.querySelectorAll(".column").forEach((column) => {
          column.classList.remove("drag-over");
        });
      }

      function canMoveToStatus(fromStatus, toStatus) {
        return ALLOWED_TRANSITIONS[fromStatus]?.includes(toStatus) ?? false;
      }

      function handleDragOver(event) {
        event.preventDefault();
        const targetColumn = event.currentTarget;
        const targetStatus = targetColumn.dataset.status;

        if (
          draggedTaskId &&
          draggedFromStatus &&
          draggedFromStatus !== targetStatus &&
          canMoveToStatus(draggedFromStatus, targetStatus)
        ) {
          targetColumn.classList.add("drag-over");
          if (event.dataTransfer) {
            event.dataTransfer.dropEffect = "move";
          }
        } else {
          targetColumn.classList.remove("drag-over");
          if (event.dataTransfer) {
            event.dataTransfer.dropEffect = "none";
          }
        }
      }

      function handleDragLeave(event) {
        if (!event.currentTarget.contains(event.relatedTarget)) {
          event.currentTarget.classList.remove("drag-over");
        }
      }

      async function handleDrop(event) {
        event.preventDefault();
        const targetColumn = event.currentTarget;
        const targetStatus = targetColumn.dataset.status;
        targetColumn.classList.remove("drag-over");

        if (
          !draggedTaskId ||
          !draggedFromStatus ||
          draggedFromStatus === targetStatus
        ) {
          draggedTaskId = null;
          draggedFromStatus = null;
          return;
        }

        const taskToMove = tasks.find((task) => task.id === draggedTaskId);
        if (!taskToMove) {
          draggedTaskId = null;
          draggedFromStatus = null;
          return;
        }

        const previousTasks = [...tasks];
        const previousStatus = taskToMove.status;

        if (!canMoveToStatus(previousStatus, targetStatus)) {
          const message = `"${taskToMove.title}" cannot move from ${previousStatus} to ${targetStatus}.`;
          tasks = previousTasks;
          renderBoard(tasks, tasks.length === 0 ? "empty" : "ready", message);
          lastErrorMessage = message;
          draggedTaskId = null;
          draggedFromStatus = null;
          return;
        }

        try {
          const response = await fetch(`${API_URL}/tasks/${draggedTaskId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: targetStatus }),
          });

          if (!response.ok) {
            const errorBody = await response.json().catch(() => ({}));
            const message =
              errorBody?.detail ||
              `Request failed with status ${response.status}`;
            tasks = previousTasks;
            renderBoard(tasks, tasks.length === 0 ? "empty" : "ready", message);
            lastErrorMessage = message;
            return;
          }

          const updatedTask = await response.json();
          tasks = tasks.map((task) =>
            task.id === updatedTask.id ? updatedTask : task,
          );
          renderBoard(tasks, tasks.length === 0 ? "empty" : "ready");
          lastErrorMessage = "";
        } catch (error) {
          tasks = previousTasks;
          renderBoard(
            tasks,
            tasks.length === 0 ? "empty" : "ready",
            "Network error while updating task.",
          );
          lastErrorMessage = "Network error while updating task.";
        } finally {
          draggedTaskId = null;
          draggedFromStatus = null;
        }
      }

      function buildModalHtml(mode, task = null) {
        const isEdit = mode === "edit";
        const taskId = task?.id || "";
        const title = task?.title || "";
        const description = task?.description || "";
        const status = task?.status || "ToDo";
        const priority = task?.priority || "Medium";
        const assignee = task?.assignee || "";
        const dueDate = task?.due_date || "";

        return `
          <div class="modal-overlay" id="task-modal-overlay">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
              <div class="modal-header">
                <h2 id="task-modal-title">${isEdit ? "Edit Task" : "New Task"}</h2>
                <button class="modal-close" type="button" id="task-modal-close" aria-label="Close">×</button>
              </div>
              <form id="task-form" class="form-grid">
                <input type="hidden" id="task-id" value="${taskId}" />
                <div class="form-field">
                  <label for="task-title">Title</label>
                  <input id="task-title" name="title" value="${escapeText(title)}" />
                  <div class="field-error" id="title-error"></div>
                </div>
                <div class="form-field">
                  <label for="task-description">Description</label>
                  <textarea id="task-description" name="description">${escapeText(description)}</textarea>
                </div>
                <div class="form-field">
                  <label for="task-status">Status</label>
                  <select id="task-status" name="status">
                    <option value="ToDo" ${status === "ToDo" ? "selected" : ""}>To Do</option>
                    <option value="InProgress" ${status === "InProgress" ? "selected" : ""}>In Progress</option>
                    <option value="Done" ${status === "Done" ? "selected" : ""}>Done</option>
                  </select>
                </div>
                <div class="form-field">
                  <label for="task-priority">Priority</label>
                  <select id="task-priority" name="priority">
                    <option value="Low" ${priority === "Low" ? "selected" : ""}>Low</option>
                    <option value="Medium" ${priority === "Medium" ? "selected" : ""}>Medium</option>
                    <option value="High" ${priority === "High" ? "selected" : ""}>High</option>
                  </select>
                </div>
                <div class="form-field">
                  <label for="task-assignee">Assignee</label>
                  <input id="task-assignee" name="assignee" value="${escapeText(assignee)}" />
                </div>
                <div class="form-field">
                  <label for="task-due-date">Due Date</label>
                  <input id="task-due-date" name="due_date" type="date" value="${escapeText(dueDate)}" />
                </div>
                <div class="form-actions">
                  <button class="btn" type="button" id="task-cancel-btn">Cancel</button>
                  <button class="btn btn-primary" type="submit">Save</button>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      function closeTaskModal() {
        modalState = null;
        document.getElementById("task-modal-overlay")?.remove();
      }

      function openTaskModal(task = null) {
        const mode = task ? "edit" : "create";
        document.body.insertAdjacentHTML(
          "beforeend",
          buildModalHtml(mode, task),
        );
        const overlay = document.getElementById("task-modal-overlay");
        const form = document.getElementById("task-form");
        const closeButton = document.getElementById("task-modal-close");
        const cancelButton = document.getElementById("task-cancel-btn");

        const clearErrors = () => {
          document.getElementById("title-error").textContent = "";
        };

        const dismissModal = () => {
          clearErrors();
          closeTaskModal();
        };

        overlay.addEventListener("click", (event) => {
          if (event.target === overlay) {
            dismissModal();
          }
        });

        closeButton.addEventListener("click", dismissModal);
        cancelButton.addEventListener("click", dismissModal);

        document.addEventListener("keydown", function handleEscape(event) {
          if (event.key === "Escape") {
            dismissModal();
            document.removeEventListener("keydown", handleEscape);
          }
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          clearErrors();

          const title = document.getElementById("task-title").value.trim();
          if (!title) {
            document.getElementById("title-error").textContent =
              "Title is required";
            return;
          }

          const dueDateValue = document.getElementById("task-due-date").value;
          if (dueDateValue) {
            const chosenDate = new Date(`${dueDateValue}T00:00:00`);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (chosenDate < today) {
              document.getElementById("title-error").textContent =
                "Due date cannot be in the past.";
              return;
            }
          }

          const description = document.getElementById("task-description").value;
          const status = document.getElementById("task-status").value;
          const priority = document.getElementById("task-priority").value;
          const assigneeValue = document
            .getElementById("task-assignee")
            .value.trim();
          const taskId = document.getElementById("task-id").value;

          const payload = {
            title,
            description: description || "",
            status,
            priority,
            assignee: assigneeValue || null,
            due_date: dueDateValue || null,
          };

          try {
            const response = await fetch(
              taskId ? `${API_URL}/tasks/${taskId}` : `${API_URL}/tasks`,
              {
                method: taskId ? "PATCH" : "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              },
            );

            if (response.ok) {
              dismissModal();
              await fetchTasks();
              return;
            }

            const errorBody = await response.json().catch(() => ({}));
            const message = errorBody?.detail || "Unable to save task.";
            document.getElementById("title-error").textContent = message;
          } catch (error) {
            document.getElementById("title-error").textContent =
              "Network error while saving task.";
          }
        });
      }

      function getActiveFilters() {
        return {
          q: searchInput.value.trim(),
          status: statusFilter.value || "",
          priority: priorityFilter.value || "",
          assignee: assigneeFilter.value.trim(),
          overdue: overdueFilter.value || "",
        };
      }

      function buildTaskQueryString(filters) {
        const params = new URLSearchParams();
        if (filters.q) {
          params.set("q", filters.q);
        }
        if (filters.status) {
          params.set("status", filters.status);
        }
        if (filters.priority) {
          params.set("priority", filters.priority);
        }
        if (filters.assignee) {
          params.set("assignee", filters.assignee);
        }
        if (filters.overdue) {
          params.set("overdue", filters.overdue);
        }
        const queryString = params.toString();
        return queryString ? `?${queryString}` : "";
      }

      function attachFilterEvents() {
        const refreshTasks = () => fetchTasks();
        searchInput.addEventListener("input", refreshTasks);
        statusFilter.addEventListener("change", refreshTasks);
        priorityFilter.addEventListener("change", refreshTasks);
        assigneeFilter.addEventListener("input", refreshTasks);
        overdueFilter.addEventListener("change", refreshTasks);
        clearFiltersButton.addEventListener("click", () => {
          searchInput.value = "";
          statusFilter.value = "";
          priorityFilter.value = "";
          assigneeFilter.value = "";
          overdueFilter.value = "";
          fetchTasks();
        });
      }

      newTaskButton.addEventListener("click", () => openTaskModal());

      async function fetchTasks() {
        renderBoard([], "loading");

        try {
          const filters = getActiveFilters();
          const response = await fetch(
            `${API_URL}/tasks${buildTaskQueryString(filters)}`,
          );
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          tasks = Array.isArray(data) ? data : [];
          renderBoard(tasks, tasks.length === 0 ? "empty" : "ready");
        } catch (error) {
          console.error("Failed to load tasks:", error);
          tasks = [];
          renderBoard([], "error", error.message);
        }
      }

      attachFilterEvents();
      fetchTasks();
    </script>
  </body>
</html>
